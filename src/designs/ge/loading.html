<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in – Google Accounts</title>
<style>
  :root {
    color-scheme: dark;
  }

  body.AfoeCd {
    --gm3-sys-color-background: rgb(0 0 0 / 1);
    --gm3-sys-color-on-surface: rgb(227 227 227 / 1);
    --gm3-sys-color-primary: rgb(168 199 250 / 1);
    --gm3-sys-color-surface-container: rgb(30 31 32 / 1);
    --gm3-sys-color-surface-container-lowest: rgb(14 14 14 / 1);
    --progress-bar: rgb(138, 180, 248);
    --progress-track: rgba(138, 180, 248, 0.24);
    color-scheme: dark;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    font-family: "Google Sans", Roboto, Arial, sans-serif;
    background: var(--gm3-sys-color-background);
    color: var(--gm3-sys-color-on-surface);
  }

  .S7xv8 {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    width: 100%;
    background: var(--gm3-sys-color-surface-container);
    justify-content: center;
    padding: 48px 0;
  }

  .TcuCfd {
    position: relative;
    margin: 0 auto;
    background-color: var(--gm3-sys-color-surface-container-lowest);
    border-radius: 28px;
    width: 480px;
    min-height: 528px;
    padding: 96px 24px 24px;
    overflow: hidden;
  }

  @media (min-width: 960px) and (orientation: landscape) {
    .TcuCfd {
      width: 840px;
      min-height: 384px;
      padding: 108px 36px 36px;
    }
  }

  @media (min-width: 1600px) {
    .TcuCfd {
      width: 1040px;
      min-height: 384px;
      padding: 108px 36px 36px;
    }
  }

  /* .wuMMWb progress strip — dump: height 4px, top of card */
  .wuMMWb {
    position: absolute;
    left: 24px;
    right: 24px;
    top: 0;
    height: 4px;
    z-index: 6;
    overflow: hidden;
    outline: none;
  }

  @media (min-width: 960px) and (orientation: landscape) {
    .wuMMWb { left: 36px; right: 36px; }
  }

  .progress {
    position: relative;
    height: 4px;
    width: 100%;
    background: var(--progress-track);
    overflow: hidden;
  }

  .progress-bar {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 40%;
    background: var(--progress-bar);
    border-radius: 0 2px 2px 0;
    animation: indeterminate 1.5s infinite linear;
  }

  @keyframes indeterminate {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    border: 0;
  }

  .logo {
    display: flex;
    height: 48px;
    margin-top: -72px;
  }

  .title {
    margin: 24px 0 0;
    font-size: 2rem;
    font-weight: 400;
    line-height: 1.25;
    color: var(--gm3-sys-color-on-surface);
  }

  @media (min-width: 840px) {
    .title { font-size: 2.25rem; line-height: 1.2222222222; }
  }

  .sub {
    margin: 16px 0 0;
    font-size: 1rem;
    line-height: 1.5;
    color: var(--gm3-sys-color-on-surface);
  }

  .hint {
    margin-top: 48px;
    font-size: 0.875rem;
    color: rgb(196 199 197);
  }
</style>
</head>
<body class="AfoeCd jR8x9d">
  <div class="S7xv8">
    <div class="TcuCfd">
      <div class="wuMMWb" aria-hidden="false">
        <div class="sr-only">Loading</div>
        <div class="progress" role="progressbar" aria-label="Loading" aria-valuemin="0" aria-valuemax="100">
          <div class="progress-bar"></div>
        </div>
      </div>

      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 40 48" aria-hidden="true">
          <path fill="#4285F4" d="M39.2 24.45c0-1.55-.16-3.04-.43-4.45H20v8h10.73c-.45 2.53-1.86 4.68-4 6.11v5.05h6.5c3.78-3.48 5.97-8.62 5.97-14.71z"/>
          <path fill="#34A853" d="M20 44c5.4 0 9.92-1.79 13.24-4.84l-6.5-5.05C24.95 35.3 22.67 36 20 36c-5.19 0-9.59-3.51-11.15-8.23h-6.7v5.2C5.43 39.51 12.18 44 20 44z"/>
          <path fill="#FABB05" d="M8.85 27.77c-.4-1.19-.62-2.46-.62-3.77s.22-2.58.62-3.77v-5.2h-6.7C.78 17.73 0 20.77 0 24s.78 6.27 2.14 8.97l6.71-5.2z"/>
          <path fill="#E94235" d="M20 12c2.93 0 5.55 1.01 7.62 2.98l5.76-5.76C29.92 5.98 25.39 4 20 4 12.18 4 5.43 8.49 2.14 15.03l6.7 5.2C10.41 15.51 14.81 12 20 12z"/>
        </svg>
      </div>
      <h1 class="title">Sign in</h1>
      <div class="sub">to continue to Gmail</div>
      <p class="hint">Loading…</p>
    </div>
  </div>
</body>
</html>
