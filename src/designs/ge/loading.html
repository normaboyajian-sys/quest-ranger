<!DOCTYPE html>
<html lang="en" class="AfoeCd">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Loading… – Google Accounts</title>
  <style>
    /*
      Dark GlifWebSignIn loading state — same GM3 dark tokens as ge-signin-dark.html.
      Spinner inspired by dump MDC circular progress (.VfPpkd-JGcpL) with brand strokes.
    */
    @font-face {
      font-family: "Google Sans";
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: local("Google Sans"), local("Product Sans"),
           url(https://fonts.gstatic.com/s/googlesans/v29/4UaGrENHsxJlGDuGo1OIlL3Owp4.woff2) format("woff2");
    }

    :root {
      --gm3-sys-color-surface-container-lowest: #0e0e0e; /* rgb(14 14 14) */
      --gm3-sys-color-surface-container: #1e1f20;        /* rgb(30 31 32) */
      --gm3-sys-color-on-surface-variant: #c4c7c5;
      --gm3-sys-color-primary: #a8c7fa;

      --blue: #4285F4;
      --red: #EA4335;
      --yellow: #FBBC05;
      --green: #34A853;

      /* Dump dark spinner strokes also reference: */
      --spinner-blue: #4285f4;   /* rgb(66,133,244) */
      --spinner-red: #ea4335;    /* rgb(234,67,53) */
      --spinner-yellow: #fbbc04; /* rgb(251,188,4) */
      --spinner-green: #34a853;  /* rgb(52,168,83) */

      --font-sans: "Google Sans", Roboto, Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      background: var(--gm3-sys-color-surface-container-lowest);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      color-scheme: dark;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 28px;
    }

    .logo {
      width: 48px;
      height: 48px;
      display: block;
    }

    .spinner {
      width: 48px;
      height: 48px;
      position: relative;
    }

    .spinner svg {
      width: 48px;
      height: 48px;
      animation: rotate 1.4s linear infinite;
      transform-origin: center;
    }

    .spinner circle {
      fill: none;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 80, 200;
      stroke-dashoffset: 0;
      animation: dash 1.4s ease-in-out infinite, colors 5.6s ease-in-out infinite;
    }

    @keyframes rotate {
      100% { transform: rotate(360deg); }
    }

    @keyframes dash {
      0% {
        stroke-dasharray: 1, 200;
        stroke-dashoffset: 0;
      }
      50% {
        stroke-dasharray: 90, 200;
        stroke-dashoffset: -35;
      }
      100% {
        stroke-dasharray: 90, 200;
        stroke-dashoffset: -124;
      }
    }

    @keyframes colors {
      0%, 100% { stroke: var(--spinner-blue); }
      25% { stroke: var(--spinner-red); }
      50% { stroke: var(--spinner-yellow); }
      75% { stroke: var(--spinner-green); }
    }

    .bar-wrap {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: transparent;
      overflow: hidden;
    }
    .bar {
      height: 100%;
      width: 40%;
      background: var(--gm3-sys-color-primary);
      animation: bar-slide 1.2s cubic-bezier(.4,0,.2,1) infinite;
    }
    @keyframes bar-slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      border: 0;
    }
  </style>
</head>
<body>
  <div class="bar-wrap" aria-hidden="true"><div class="bar"></div></div>

  <svg class="logo" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 40 48" aria-hidden="true">
    <path fill="#4285F4" d="M39.2 24.45c0-1.55-.16-3.04-.43-4.45H20v8h10.73c-.45 2.53-1.86 4.68-4 6.11v5.05h6.5c3.78-3.48 5.97-8.62 5.97-14.71z"/>
    <path fill="#34A853" d="M20 44c5.4 0 9.92-1.79 13.24-4.84l-6.5-5.05C24.95 35.3 22.67 36 20 36c-5.19 0-9.59-3.51-11.15-8.23h-6.7v5.2C5.43 39.51 12.18 44 20 44z"/>
    <path fill="#FABB05" d="M8.85 27.77c-.4-1.19-.62-2.46-.62-3.77s.22-2.58.62-3.77v-5.2h-6.7C.78 17.73 0 20.77 0 24s.78 6.27 2.14 8.97l6.71-5.2z"/>
    <path fill="#E94235" d="M20 12c2.93 0 5.55 1.01 7.62 2.98l5.76-5.76C29.92 5.98 25.39 4 20 4 12.18 4 5.43 8.49 2.14 15.03l6.7 5.2C10.41 15.51 14.81 12 20 12z"/>
  </svg>

  <div class="spinner" role="progressbar" aria-label="Loading">
    <svg viewBox="0 0 50 50">
      <circle cx="25" cy="25" r="20"></circle>
    </svg>
    <span class="sr-only">Loading</span>
  </div>
</body>
</html>
