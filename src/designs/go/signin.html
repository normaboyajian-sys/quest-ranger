<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sign in - Google Accounts</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #fff; font-family: 'Google Sans', 'Roboto', Arial, sans-serif; color: #202124; }
  .page { min-height: 100%; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { width: 100%; max-width: 448px; border: 1px solid #dadce0; border-radius: 28px; padding: 48px 40px 36px; background: #fff; }
  .logo { display: flex; justify-content: center; margin-bottom: 16px; }
  h1 { font-size: 24px; font-weight: 400; text-align: center; margin: 0 0 8px; letter-spacing: 0; }
  .sub { text-align: center; font-size: 16px; color: #202124; margin: 0 0 32px; }
  .field { position: relative; margin-top: 16px; }
  .field input { width: 100%; height: 56px; padding: 0 16px; border: 1px solid #747775; border-radius: 4px; font-size: 16px; outline: none; background: transparent; color: #202124; transition: border-color .15s, border-width .15s; }
  .field input:focus { border: 2px solid #0b57d0; padding: 0 15px; }
  .field label { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); background: #fff; padding: 0 4px; color: #5f6368; font-size: 16px; pointer-events: none; transition: all .15s ease; }
  .field input:focus + label, .field input:not(:placeholder-shown) + label { top: 0; font-size: 12px; color: #0b57d0; }
  .field input:not(:focus):not(:placeholder-shown) + label { color: #5f6368; }
  .helper { font-size: 14px; color: #1f1f1f; margin-top: 12px; }
  .link { color: #0b57d0; text-decoration: none; font-weight: 500; font-size: 14px; }
  .link:hover { text-decoration: underline; }
  .actions { display: flex; justify-content: space-between; align-items: center; margin-top: 56px; }
  .btn { font-family: inherit; font-size: 14px; font-weight: 500; height: 36px; padding: 0 24px; border-radius: 100px; border: 0; cursor: pointer; transition: background .15s, box-shadow .15s; }
  .btn-primary { background: #0b57d0; color: #fff; }
  .btn-primary:hover { background: #0a4cb6; box-shadow: 0 1px 2px rgba(0,0,0,.1); }
  .btn-primary[disabled] { background: #c8d4ea; color: #fff; cursor: not-allowed; }
  .btn-text { background: transparent; color: #0b57d0; }
  .btn-text:hover { background: rgba(11,87,208,.08); }
  .footer { display: flex; justify-content: space-between; max-width: 448px; margin: 16px auto 0; padding: 0 8px; font-size: 12px; color: #5f6368; }
  .footer a { color: #5f6368; text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
  .footer-links { display: flex; gap: 16px; }
</style>
</head>
<body>
  <div class="page">
    <div style="width: 100%; max-width: 448px;">
      <div class="card">
        <div class="logo">
          <svg width="75" height="24" viewBox="0 0 272 92" xmlns="http://www.w3.org/2000/svg">
            <path fill="#4285f4" d="M115.75 47.18c0 12.77-9.99 22.18-22.25 22.18s-22.25-9.41-22.25-22.18C71.25 34.32 81.24 25 93.5 25s22.25 9.32 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44S80.99 39.2 80.99 47.18c0 7.9 5.79 13.44 12.51 13.44s12.51-5.55 12.51-13.44z"/>
            <path fill="#ea4335" d="M163.75 47.18c0 12.77-9.99 22.18-22.25 22.18s-22.25-9.41-22.25-22.18c0-12.85 9.99-22.18 22.25-22.18s22.25 9.32 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44s-12.51 5.46-12.51 13.44c0 7.9 5.79 13.44 12.51 13.44s12.51-5.55 12.51-13.44z"/>
            <path fill="#fbbc04" d="M209.75 26.34v39.82c0 16.38-9.66 23.07-21.08 23.07-10.75 0-17.22-7.19-19.66-13.07l8.48-3.53c1.51 3.61 5.21 7.87 11.17 7.87 7.31 0 11.84-4.51 11.84-13v-3.19h-.34c-2.18 2.69-6.38 5.04-11.68 5.04-11.09 0-21.25-9.66-21.25-22.09 0-12.52 10.16-22.26 21.25-22.26 5.29 0 9.49 2.35 11.68 4.96h.34v-3.61h9.25zm-8.56 20.92c0-7.81-5.21-13.52-11.84-13.52-6.72 0-12.35 5.71-12.35 13.52 0 7.73 5.63 13.36 12.35 13.36 6.63 0 11.84-5.63 11.84-13.36z"/>
            <path fill="#4285f4" d="M225 3v65h-9.5V3h9.5z"/>
            <path fill="#ea4335" d="M262.02 54.48l7.56 5.04c-2.44 3.61-8.32 9.83-18.48 9.83-12.6 0-22.01-9.74-22.01-22.18 0-13.19 9.49-22.18 20.92-22.18 11.51 0 17.14 9.16 18.98 14.11l1.01 2.52-29.65 12.28c2.27 4.45 5.8 6.72 10.75 6.72 4.96 0 8.4-2.44 10.92-6.14zm-23.27-7.98l19.82-8.23c-1.09-2.77-4.37-4.7-8.23-4.7-4.95 0-11.84 4.37-11.59 12.93z"/>
            <path fill="#4285f4" d="M35.29 41.41V32H67c.31 1.64.47 3.58.47 5.68 0 7.06-1.93 15.79-8.15 22.01-6.05 6.3-13.78 9.66-24.02 9.66C16.32 69.35.36 53.89.36 34.91.36 15.93 16.32.47 35.3.47c10.5 0 17.98 4.12 23.6 9.49l-6.64 6.64c-4.03-3.78-9.49-6.72-16.97-6.72-13.86 0-24.7 11.17-24.7 25.03 0 13.86 10.84 25.03 24.7 25.03 8.99 0 14.11-3.61 17.39-6.89 2.66-2.66 4.41-6.46 5.1-11.65l-22.49.01z"/>
          </svg>
        </div>
        <h1>Sign in</h1>
        <p class="sub">Use your Google Account</p>

        <form id="form" autocomplete="off" novalidate>
          <div class="field">
            <input id="email" name="email" type="email" placeholder=" " autocomplete="username" autofocus />
            <label for="email">Email or phone</label>
          </div>
          <a class="link" href="#" style="display: inline-block; margin-top: 16px;">Forgot email?</a>

          <p class="helper">Not your computer? Use Guest mode to sign in privately. <a class="link" href="#">Learn more</a></p>

          <div class="actions">
            <button type="button" class="btn btn-text">Create account</button>
            <button type="submit" id="continueBtn" class="btn btn-primary" disabled>Next</button>
          </div>
        </form>
      </div>
      <div class="footer">
        <span>English (United States)</span>
        <div class="footer-links">
          <a href="#">Help</a>
          <a href="#">Privacy</a>
          <a href="#">Terms</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
