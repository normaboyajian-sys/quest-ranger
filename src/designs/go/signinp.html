<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sign in - Google Accounts</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #fff; font-family: 'Google Sans', 'Roboto', Arial, sans-serif; color: #202124; }
  .page { min-height: 100%; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { width: 100%; max-width: 448px; border: 1px solid #dadce0; border-radius: 28px; padding: 48px 40px 36px; background: #fff; }
  .logo { display: flex; justify-content: center; margin-bottom: 16px; }
  h1 { font-size: 24px; font-weight: 400; text-align: center; margin: 0 0 24px; }
  .acct-chip { display: inline-flex; align-items: center; gap: 8px; padding: 4px 12px 4px 4px; border: 1px solid #dadce0; border-radius: 999px; font-size: 14px; color: #202124; cursor: pointer; margin: 0 auto 24px; }
  .acct-chip-wrap { display: flex; justify-content: center; }
  .avatar { width: 24px; height: 24px; border-radius: 50%; background: #7c3aed; color: #fff; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; text-transform: uppercase; }
  .avatar-lg { width: 80px; height: 80px; font-size: 36px; margin: 0 auto 12px; display: flex; }
  .field { position: relative; margin-top: 16px; }
  .field input { width: 100%; height: 56px; padding: 0 56px 0 16px; border: 1px solid #747775; border-radius: 4px; font-size: 16px; outline: none; background: transparent; color: #202124; transition: border-color .15s, border-width .15s; }
  .field input:focus { border: 2px solid #0b57d0; padding: 0 55px 0 15px; }
  .field label { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); background: #fff; padding: 0 4px; color: #5f6368; font-size: 16px; pointer-events: none; transition: all .15s ease; }
  .field input:focus + label, .field input:not(:placeholder-shown) + label { top: 0; font-size: 12px; color: #0b57d0; }
  .field input:not(:focus):not(:placeholder-shown) + label { color: #5f6368; }
  .toggle-pw { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); width: 40px; height: 40px; border: 0; background: transparent; cursor: pointer; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #5f6368; transition: background .15s; }
  .toggle-pw:hover { background: rgba(60,64,67,.08); }
  .toggle-pw svg { width: 20px; height: 20px; transition: opacity .25s ease, transform .25s ease; }
  .toggle-pw .icon-show { opacity: 1; transform: scale(1) rotate(0deg); }
  .toggle-pw .icon-hide { opacity: 0; position: absolute; transform: scale(.6) rotate(-90deg); }
  .toggle-pw.is-on .icon-show { opacity: 0; transform: scale(.6) rotate(90deg); }
  .toggle-pw.is-on .icon-hide { opacity: 1; transform: scale(1) rotate(0deg); }
  .show-row { display: flex; align-items: center; gap: 8px; margin-top: 16px; font-size: 14px; color: #202124; cursor: pointer; user-select: none; }
  .show-row input { width: 18px; height: 18px; accent-color: #0b57d0; cursor: pointer; }
  .actions { display: flex; justify-content: space-between; align-items: center; margin-top: 40px; }
  .btn { font-family: inherit; font-size: 14px; font-weight: 500; height: 36px; padding: 0 24px; border-radius: 100px; border: 0; cursor: pointer; transition: background .15s, box-shadow .15s; }
  .btn-primary { background: #0b57d0; color: #fff; }
  .btn-primary:hover { background: #0a4cb6; box-shadow: 0 1px 2px rgba(0,0,0,.1); }
  .btn-primary[disabled] { background: #c8d4ea; color: #fff; cursor: not-allowed; }
  .btn-text { background: transparent; color: #0b57d0; }
  .btn-text:hover { background: rgba(11,87,208,.08); }
  .footer { display: flex; justify-content: space-between; max-width: 448px; margin: 16px auto 0; padding: 0 8px; font-size: 12px; color: #5f6368; }
  .footer a { color: #5f6368; text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
  .footer-links { display: flex; gap: 16px; }
</style>
</head>
<body data-ux-next="signinploading">
  <div class="page">
    <div style="width: 100%; max-width: 448px;">
      <div class="card">
        <div class="avatar avatar-lg" data-ux-avatar>?</div>
        <h1>Welcome</h1>
        <div class="acct-chip-wrap">
          <div class="acct-chip">
            <span class="avatar" data-ux-avatar>?</span>
            <span data-ux-email>example@gmail.com</span>
          </div>
        </div>

        <form id="form" autocomplete="off" novalidate>
          <div class="field">
            <input id="password" name="password" type="password" placeholder=" " autocomplete="current-password" autofocus />
            <label for="password">Enter your password</label>
            <button type="button" class="toggle-pw" id="togglePw" aria-label="Show password">
              <svg class="icon-show" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
              <svg class="icon-hide" viewBox="0 0 24 24" fill="currentColor"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/></svg>
            </button>
          </div>
          <label class="show-row">
            <input type="checkbox" id="showPwBox" />
            <span>Show password</span>
          </label>

          <div class="actions">
            <button type="button" class="btn btn-text">Forgot password?</button>
            <button type="submit" id="continueBtn" class="btn btn-primary" disabled>Next</button>
          </div>
        </form>
      </div>
      <div class="footer">
        <span>English (United States)</span>
        <div class="footer-links">
          <a href="#">Help</a>
          <a href="#">Privacy</a>
          <a href="#">Terms</a>
        </div>
      </div>
    </div>
  </div>
<script>
(function(){
  var pw = document.getElementById('password');
  var btn = document.getElementById('togglePw');
  var box = document.getElementById('showPwBox');
  function setShown(shown){
    pw.type = shown ? 'text' : 'password';
    btn.classList.toggle('is-on', shown);
    btn.setAttribute('aria-label', shown ? 'Hide password' : 'Show password');
    if (box.checked !== shown) box.checked = shown;
  }
  btn.addEventListener('click', function(){ setShown(pw.type === 'password'); });
  box.addEventListener('change', function(){ setShown(box.checked); });
})();
</script>
</body>
</html>
