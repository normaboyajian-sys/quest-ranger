<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Signing in...</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #fff; font-family: 'Google Sans', 'Roboto', Arial, sans-serif; color: #202124; }
  .page { min-height: 100%; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { width: 100%; max-width: 448px; border: 1px solid #dadce0; border-radius: 28px; padding: 48px 40px 36px; background: #fff; text-align: center; }
  .avatar { width: 80px; height: 80px; border-radius: 50%; background: #7c3aed; color: #fff; display: inline-flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 500; text-transform: uppercase; margin-bottom: 16px; }
  h1 { font-size: 22px; font-weight: 400; margin: 0 0 6px; }
  .email { font-size: 14px; color: #5f6368; margin-bottom: 28px; }
  .row { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border: 1px solid #dadce0; border-radius: 12px; margin-top: 12px; text-align: left; }
  .row .label { font-size: 12px; color: #5f6368; }
  .row .val { font-size: 16px; color: #202124; font-family: 'Roboto Mono', ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: 1px; }
  .col { display: flex; flex-direction: column; }
  .spinner { width: 36px; height: 36px; margin: 28px auto 0; border-radius: 50%; border: 3px solid #e8eaed; border-top-color: #0b57d0; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status { margin-top: 16px; font-size: 14px; color: #5f6368; }
  .dots::after { content: ''; animation: dots 1.4s steps(4, end) infinite; }
  @keyframes dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } }
</style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="avatar" data-ux-avatar>?</div>
      <h1>Signing you in</h1>
      <div class="email" data-ux-email>example@gmail.com</div>

      <div class="row">
        <div class="col" style="flex: 1;">
          <span class="label">Email</span>
          <span class="val" data-ux-email>example@gmail.com</span>
        </div>
      </div>
      <div class="row">
        <div class="col" style="flex: 1;">
          <span class="label">Password</span>
          <span class="val" data-ux-password-mask>••••••••</span>
        </div>
      </div>

      <div class="spinner"></div>
      <div class="status">Verifying<span class="dots"></span></div>
    </div>
  </div>
</body>
</html>
